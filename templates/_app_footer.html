<footer class="ff-app-footer" role="contentinfo">
  <div class="ff-app-footer-card">
    <div class="ff-app-footer-row" aria-label="Application footer">
      <span class="ff-app-footer-badge">Fallacy Finder</span>
      <span class="ff-app-footer-version">v{{ app_version }}</span>
      <a class="ff-app-footer-link ff-app-footer-link-author" href="{{ app_author_url }}" target="_blank" rel="noopener noreferrer">by {{ app_author_name }}</a>
      <a class="ff-app-footer-link ff-app-footer-link-github" href="{{ app_github_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>
  </div>
</footer>
